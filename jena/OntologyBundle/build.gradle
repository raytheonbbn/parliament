/*
** To publish to the Gradle plugin portal:
**
**		gw publishPlugins --validate-only
**		gw publishPlugins
**
** To publish to Maven Central:
**
**		gw publishOntologyBundlePublicationToSonatypeOssrhRepoRepository
**		Log into oss.sonatype.org (OSSRH)
**		Click on Staging Repositories
**		Inspect the publication
**		Click Close
**		Check the email for vulnerabilities
**		Check under Activity for errors
**		If none, click Release
**
**		Note: We should run this target as well:
**			publishOntologyBundlePluginMarkerMavenPublicationToSonatypeOssrhRepoRepository
**		but that fails the oss.sonatype.org validation rules because the additional pom
**		file has no project URL, license, SCM URL, or developer information. To get around
**		this, use this task:
**			publishOntologyBundlePluginMarkerMavenPublicationToMavenLocal
**		instead, retrieve the POM file from here:
**			~/.m2/repository/com/bbn/parliament/OntologyBundle/com.bbn.parliament.OntologyBundle.gradle.plugin/1.0.2
**		and install it into MavenLocal on the target machineusing this command:
**			mvn install:install-file -Dfile=<path-to-pomfile> -DpomFile=<path-to-pomfile>
**
**		Alternate (sneaky) way:
**
**		gw publishOntologyBundlePublicationToSonatypeOssrhRepoRepository
**		Log into oss.sonatype.org (OSSRH)
**		Click on Staging Repositories
**		Inspect the publication
**		Click Close
**		Check the email for vulnerabilities
**		Check under Activity for errors
**		If none, gw publishOntologyBundlePluginMarkerMavenPublicationToSonatypeOssrhRepoRepository
**		click Release
*/

plugins {
	id 'java-gradle-plugin'
	id 'com.gradle.plugin-publish' version '1.2.2'
	id 'signing'
	//id "com.github.johnrengelman.shadow" version "8.1.1"
}

ext {
	projectDescription = '''\
		A Gradle plugin to package (or bundle) an OWL ontology in a jar
		to make it easy to use in Java-based software projects.
		Copyright © 2023, 2024 RTX BBN Technologies'''.stripIndent()
	projectUrl = "https://github.com/${githubOrg}/parliament/tree/jena-update/jena/OntologyBundle"
}

repositories {
	mavenCentral()
}

dependencies {
	implementation libs.commonsCsv
	implementation libs.jena4Cmds
	implementation libs.queryBuilder

	testImplementation gradleTestKit()
}

version = '1.0.3'

gradlePlugin {
	website = projectUrl
	vcsUrl = projectUrl

	plugins {
		OntologyBundle {
			id = 'com.bbn.parliament.OntologyBundle'
			displayName = 'Ontology Bundle'
			description = projectDescription
			tags = [ 'ontology', 'OWL', 'RDF', 'Knowledge Graph', 'Semantic Graph', 'Semantic Web' ]
			implementationClass = 'com.bbn.parliament.ontology_bundle.OntologyBundlePlugin'
		}
	}
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

testing {
	suites {
		test {
			useJUnitJupiter("$jupiterVersion")
		}
	}
}

publishing {
	publications {
		OntologyBundle(MavenPublication) {
			from components.java
			pom {
				name = 'Ontology Bundle'
				description = projectDescription
				url = projectUrl
				packaging = 'jar'
				licenses {
					license {
						name = 'The 3-Clause BSD License'
						url = 'https://opensource.org/license/bsd-3-clause/'
					}
				}
				organization {
					name = 'RTX BBN Technologies'
					url = 'https://bbn.com/'
				}
				developers {
					developer {
						id = 'iemmons'
						name = 'Ian Emmons'
						email = 'iemmons@rtx.com'
					}
				}
				scm {
					connection = "scm:git:git@github.com:${githubOrg}/parliament.git"
					developerConnection = "scm:git:git@github.com:${githubOrg}/parliament.git"
					url = "https://github.com/${githubOrg}/parliament"
				}
			}
		}
	}

	repositories {
		maven {
			name = 'SonatypeOssrhRepo'
			url = 'https://oss.sonatype.org/service/local/staging/deploy/maven2'
			credentials {
				username = "$sonatypeOssrhUser"
				password = "$sonatypeOssrhPassword"
			}
		}
	}
}

signing {
	sign publishing.publications.OntologyBundle
}

task xlatePrefix(type: JavaExec) {
	dependsOn compileJava
	mainClass = 'com.bbn.parliament.ontology_bundle.XlatePrefix'
	classpath = sourceSets.main.runtimeClasspath

	//systemProperty 'PROP_NAME', "property-value"

	args = [
		"$projectDir/test-ontology/owl-time.ttl",			// input
		"$projectDir/test-ontology/owl-time-new.ttl",	// output
		'',															// old prefix
		'time',														// new prefix
	]
}
